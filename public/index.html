    <!--
      Applies the theme before the first paint. Inline and synchronous on
      purpose: deferring it shows a flash of the wrong theme. Defaults to light
      unless the visitor has explicitly chosen a theme before.
    -->
    <script>
      (function () {
        var theme;
        try {
          theme = localStorage.getItem('theme');
        } catch (e) {}
        if (theme !== 'light' && theme !== 'dark') {
          theme = 'light';
        }
        document.documentElement.classList.add('theme-' + theme);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <meta
